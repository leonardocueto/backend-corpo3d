# Blueprint de Render (https://render.com): crea el servicio web del backend a
# partir del Dockerfile. La base de datos NO va aca: se usa Neon (Postgres
# administrado) y su connection string se carga en DATABASE_URL.
#
# Las vars con `sync: false` se cargan A MANO en el dashboard de Render (son
# secretos / dependen de otros servicios). SESSION_SECRET lo genera Render.
services:
  - type: web
    name: backend-corpo3d
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: COOKIE_SAMESITE
        # Front (www.corpolab3d.com) y api (api.corpolab3d.com) comparten dominio
        # registrable = same-site: "lax" alcanza (Secure lo fuerza ENVIRONMENT=production).
        value: lax
      - key: SESSION_DAYS
        value: "7"
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        # Neon: postgresql+psycopg://USER:PASS@HOST.neon.tech/DB?sslmode=require
        sync: false
      - key: CORS_ORIGINS
        # JSON array con el origen exacto del front: ["https://www.corpolab3d.com"]
        sync: false
      - key: RESET_TOKEN_MINUTES
        value: "10"
      - key: FRONTEND_URL
        # URL del front (base del link del email): https://www.corpolab3d.com
        sync: false
      - key: EMAIL_FROM
        # Remitente. Prueba: "CorpoLab 3D <onboarding@resend.dev>" (solo envia al
        # mail de tu cuenta Resend). Real: no-reply@<dominio verificado>.
        sync: false
      - key: RESEND_API_KEY
        # Secreto de Resend (re_...). Se carga a mano en el dashboard de Render.
        sync: false
      # Login con Google (OIDC). Client ID PUBLICO (no es secreto, pero se carga a
      # mano). El front necesita el MISMO valor en NUXT_PUBLIC_GOOGLE_CLIENT_ID.
      - key: GOOGLE_CLIENT_ID
        sync: false
      # Cloudflare R2 (disenos guardados; bucket privado). Secretos: a mano.
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
